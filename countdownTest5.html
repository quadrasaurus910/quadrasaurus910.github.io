<!DOCTYPE html>
<html lang="en">

    <head>
        <title>Countdown</title>
        <style>
            @keyframes slide {
                from {
                    width: 0px;
                }

                to {
                    width: 400px;
                }
            }

            @keyframes trans1 {
                0% {
                    background-color: black;
                }
                50% {
                    background-color: #DD87C3;
                }
                100% {
                    background-color: white;
                }
            }

            @keyframes trans2 {
                0% {
                    background-color: white;
                }
                50% {
                    background-color: black;
                }
                100% {
                    /*background-image: url('https://photojournal.jpl.nasa.gov/jpeg/PIA22694.jpg');*/
                    background-image: url('IMG_0351.jpeg');
                }
            }

            @keyframes trans1b {
                0% {
                    opacity: 0%;
                }
                100% {
                    opacity: 0%;
                }
            }

            @keyframes trans2b {
                0% {
                    transform: scale(1);
                    opacity: 1;
                }
                50% {
                    color: white;
                }
                100% {
                    transform: scale(50);
                    opacity: 0;
                }
            }

            @keyframes trans3 {
                from {
                    width: 80%;
                }
                to {
                    width: 0%;
                }
            }

            @keyframes trans3b {
                from {
                    width: 0%;
                }
                to {
                    width: 80%;
                }
            }

            div {
                display: none;
            }

            .text1 {
                font-size: 24pt;
                color: #DD87C3;
                position: relative;
                width: 0px;
                text-align: left;
                overflow: hidden;
                white-space: nowrap;
                height: 40px;
            }

            #dateDiv {
                text-align: center;
                margin: 100px 0% 0% 0%;

            }

            #dateText {
                font-size: 24pt;
            }

            #dateBtn {
                width: 220px;
                height: 100px;
                background-color: rgba(0,0,0,0);
                color: pink;
                border: 3px solid pink;
                border-radius: 10px;
                font-size: 26pt;
            }
            #dateBtn:hover,
            #dateBtn:focus {
                background-color: rgba(238,180,214,1);
            }

            .cdc1 {
                text-align: center;
                margin: 0% 0% 0% 0%;
                color: white;
                height: 50px;
                /*padding: 5px 5px 5px 5px;
                font-family: 'Brush Script MT', cursive;
                border: 1px solid green;*/
                font-family: Garamond, serif;
                white-space: nowrap;
            }
            .countDivClass {
                font-size: 26pt;
                color: white;
                border-top: 0.5px solid white;
                margin: 0pt 0pt 0pt 0pt;
                padding: 0px 0px 20px 0px;
                height: 60px;
            }            
        </style>
    </head>
    <body>
        <p class="text1" id="text1">Hello, Brittany!</p>
        <div id="dateDiv" data-page="page0">
            <p id="dateText">Please enter our anniversary date.</p>
            <input type="date" id="date" name="date" autofocus>
            <br>
            
            <br>
            <button id="dateBtn" name="dateBtn" data-page="countdownDiv">Submit</button>
            <p id="testP"></p>
            <p id="testP2"></p>
        </div>
        <div id="countdownDiv">
            <div id="cdHead"></div>
            <div class="cdc1">
                <p id="countdown"></p>
            </div>
            <div class="countDivClass">
                <p>until</p>
            </div>
            <div class="countDivClass">
                <p>Anniversary</p>
            </div>
        </div>
    </body>

    <script>
        const body = document.body;
        const text1 = document.querySelector('#text1');
        const dateDiv = document.querySelector('#dateDiv');
        const dateBtn = document.querySelector('#dateBtn');
        const testP = document.querySelector('#testP');
        const testP2 = document.querySelector('#testP2');
        const countdownDiv = document.querySelector('#countdownDiv');
        const countDivClass = document.querySelectorAll('.countDivClass');
        const cdc1 = document.querySelector('.cdc1');

        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.backgroundColor = 'black';

            text1.addEventListener('animationend', () => {
                text1.style.display = 'none';
                dateDiv.style.display = 'block';
                body.addEventListener('animationend', () => {
                    body.style.backgroundColor = 'white';
                })
                body.style.animation = 'trans1 2s 1';
                dateDiv.style.animation = 'trans1b 1s 1';
            });

            text1.style.animation = 'slide 4s 1';

            dateBtn.addEventListener('click', function() {
                dateT = document.querySelector('#date').value;
                jsd2 = new Date();
                temp1 = Temporal.Now.instant();
                oldDate = new Date("August 9, 2005 20:00:00 GMT-0400");
                if (!dateT) {
                        alert("Please enter a date.");
                        return;
                    }

                testP.innerHTML = temp1;
                testP2.innerHTML = jsd2;
            });

        });
    </script>

</html>
