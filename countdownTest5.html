<!DOCTYPE html>
<html lang="en">

    <head>
        <title>Countdown</title>
        <style>
            @keyframes slide {
                from {
                    width: 0px;
                }

                to {
                    width: 400px;
                }
            }

            @keyframes trans1 {
                0% {
                    background-color: black;
                }
                50% {
                    background-color: #DD87C3;
                }
                100% {
                    background-color: white;
                }
            }
            
            @keyframes trans2 {
                0% {
                    background-color: white;
                }
                50% {
                    background-color: black;
                }
                100% {
                    /*background-image: url('https://photojournal.jpl.nasa.gov/jpeg/PIA22694.jpg');*/
                    background-image: url('IMG_0351.jpeg');
                }
            }

            @keyframes trans1b {
                0% {
                    opacity: 0%;
                }
                100% {
                    opacity: 0%;
                }
            }

            @keyframes trans2b {
                0% {
                    transform: scale(1);
                    opacity: 1;
                }
                50% {
                    color: white;
                }
                100% {
                    transform: scale(50);
                    opacity: 0;
                }
            }

            @keyframes trans3 {
                from {
                    width: 80%;
                }
                to {
                    width: 0%;
                }
            }

            @keyframes trans3b {
                from {
                    width: 0%;
                }
                to {
                    width: 80%;
                }
            }

            .text1 {
                font-size: 24pt;
                color: #DD87C3;
                position: relative;
                width: 0px;
                text-align: left;
                overflow: hidden;
                white-space: nowrap;
                height: 40px;
            }
        </style>
    </head>
    <body>
        <p class="text1" id="text1">Hello, Brittany!</p>
    </body>

    <script>
        const text1 = document.querySelector('#text1');

        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.backgroundColor = 'black';

            text1.addEventListener('animationend', () => {
            });

            text1.style.animation = 'slide 4s 1';

        });
    </script>

</html>
