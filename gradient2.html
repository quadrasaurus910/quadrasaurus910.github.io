<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keplerian Exoplanet Cross-Section Simulator</title>
    <style>
        :root {
            --bg-color: #050509;
            --panel-bg: #10101a;
            --text-color: #e0e0f0;
            --accent: #7f5af0;
            --accent-hover: #9475f3;
            --green: #2cb67d;
            --border: #303040;
            --border-radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 380px;
            overflow: hidden;
            /* Subtly fade in the whole body */
            animation: fadeIn 0.5s ease-out;
        }

        /* --- Boot Sequence Animations --- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes bootUpFocus {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(10px); }
            50% { opacity: 1; filter: blur(2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        @keyframes slideInCompile {
            0% { opacity: 0; transform: translateX(40px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        @keyframes flickerOn {
            0%, 10%, 20%, 30%, 100% { opacity: 1; }
            5%, 15%, 25% { opacity: 0.3; }
        }

        /* --- Preview Area (Main) --- */
        #preview-section {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            border-right: 1px solid var(--border);
            /* Apply boot sequence */
            opacity: 0;
            animation: bootUpFocus 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        h1 { 
            font-size: 1.2rem; 
            color: var(--accent); 
            animation: flickerOn 1.5s ease-in-out;
        }

        #svg-container {
            flex-grow: 1;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050509 100%);
            border-radius: var(--border-radius);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        svg {
            width: 90%;
            height: 90%;
            max-width: 800px;
            max-height: 800px;
            z-index: 2; /* Keep planet above starfield */
        }

        /* Background Starfield inside SVG container */
        .starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.6;
        }

        /* --- Controls Area (Sidebar) --- */
        #controls-section {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            background-color: var(--panel-bg);
            /* Slide in the controls like a side-panel compiling */
            opacity: 0;
            animation: slideInCompile 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        h2 { font-size: 1rem; color: var(--green); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px;}

        .control-group {
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: var(--border-radius);
            background: rgba(0,0,0,0.2);
        }

        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; gap: 0.5rem; }
        .row:last-child { margin-bottom: 0; }

        label { font-size: 0.85rem; color: #a0a0b0; }
        .value-display { font-family: monospace; color: var(--text-color); font-size: 0.85rem; }

        /* Inputs */
        input[type="range"] { flex-grow: 1; accent-color: var(--accent); cursor: pointer; }
        input[type="color"] { border: none; width: 40px; height: 24px; background: none; cursor: pointer; }
        input[type="number"] { width: 60px; background: #050509; border: 1px solid var(--border); color: var(--text-color); padding: 2px 4px; border-radius: 4px; }

        /* Buttons & Toggles */
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-weight: bold;
        }
        button:hover { background-color: var(--accent-hover); box-shadow: 0 0 10px rgba(127, 90, 240, 0.4); }
        button.secondary { background-color: #303040; color: #e0e0f0; font-weight: normal; }
        button.secondary:hover { background-color: #404050; box-shadow: none; }
        button.active { background-color: var(--green); color: #000; box-shadow: 0 0 10px rgba(44, 182, 125, 0.4); }

        .toggle-btn {
            width: 50px; height: 24px; background: #303040; border-radius: 12px;
            position: relative; cursor: pointer; transition: background 0.3s;
        }
        .toggle-btn.on { background: var(--green); box-shadow: 0 0 8px rgba(44, 182, 125, 0.3); }
        .toggle-btn::after {
            content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px;
            background: white; border-radius: 50%; transition: left 0.3s;
        }
        .toggle-btn.on::after { left: 26px; }

        /* Snippet Output */
        .code-container {
            position: relative;
            margin-top: auto;
        }
        
        #copy-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 4px 8px;
            font-size: 0.7rem;
            background: #303040;
        }

        #code-out {
            background: #050509;
            padding: 1.5rem 0.75rem 0.75rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #4ade80;
            white-space: pre-wrap;
            border: 1px solid var(--border);
            max-height: 150px;
            overflow-y: auto;
        }

        /* Fullscreen handling */
        :-webkit-full-screen #svg-container { width: 100vw; height: 100vh; max-width: none; max-height: none; border-radius: 0; }
        :-webkit-full-screen svg { width: 80vh; height: 80vh; }
        :-webkit-full-screen #controls-section { display: none; }
    </style>
</head>
<body>

    <section id="preview-section">
        <header>
            <h1>System Node Initialization</h1>
            <button id="fullscreen-btn" class="secondary">⛶ Full Screen</button>
        </header>
        <div id="svg-container">
            <!-- Background Starfield Pattern -->
            <svg class="starfield" width="100%" height="100%">
                <defs>
                    <pattern id="stars" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
                        <circle fill="#ffffff" cx="10" cy="10" r="1.5" opacity="0.8"></circle>
                        <circle fill="#ffffff" cx="45" cy="80" r="1" opacity="0.5"></circle>
                        <circle fill="#ffffff" cx="80" cy="30" r="2" opacity="0.9"></circle>
                        <circle fill="#ffffff" cx="25" cy="60" r="0.8" opacity="0.4"></circle>
                        <circle fill="#ffffff" cx="90" cy="90" r="1.2" opacity="0.6"></circle>
                    </pattern>
                </defs>
                <rect x="0" y="0" width="100%" height="100%" fill="url(#stars)"></rect>
            </svg>

            <svg id="system-svg" viewBox="0 0 100 100">
                <defs>
                    <!-- Core Radial Gradient representing the system -->
                    <radialGradient id="systemGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                        <stop id="stop-surface" offset="0%" stop-color="#330000" />
                        <stop id="stop-atmos-inner" offset="10%" stop-color="#ff6600" />
                        <stop id="stop-atmos-outer" offset="30%" stop-color="#00ffff" stop-opacity="0.8" />
                        <stop id="stop-medium" offset="100%" stop-color="#050509" />
                    </radialGradient>
                </defs>
                <!-- Main Planet/System body -->
                <circle cx="50%" cy="50%" r="48" fill="url(#systemGradient)" />
            </svg>
        </div>
    </section>

    <aside id="controls-section">
        <div class="row">
            <button id="randomize-all" style="width: 100%;">🎲 Manual Randomize</button>
        </div>

        <div class="control-group">
            <h2>Auto-Pilot (Randomizer)</h2>
            <div class="row">
                <button class="timer-btn secondary active" data-time="0">OFF</button>
                <button class="timer-btn secondary" data-time="5">5s</button>
                <button class="timer-btn secondary" data-time="20">20s</button>
                <input type="number" id="timer-custom" min="1" placeholder="Sec" style="width:50px;">
            </div>
            <button id="auto-play-toggle" style="width: 100%; margin-top: 0.5rem;" class="secondary">▶ Start Auto-Random</button>
        </div>

        <div class="control-group">
            <h2>Keplerian Transform</h2>
            <div class="row">
                <label>Orbital Time (t)</label>
                <div class="row" style="margin:0;">
                    <span id="t-val" class="value-display">0</span>
                    <button id="play-t" class="secondary">▶</button>
                </div>
            </div>
            <input type="range" id="t-slider" min="0" max="1000" value="0">

            <div class="row" style="margin-top: 0.75rem;">
                <label>Semi-major Axis (a)</label>
                <div class="row" style="margin:0;">
                    <span id="a-val" class="value-display">30</span>
                    <div id="animate-a" class="toggle-btn"></div>
                </div>
            </div>
            <input type="range" id="a-slider" min="5" max="50" value="30">
        </div>

        <div class="control-group">
            <h2>Gradient Zones</h2>
            <!-- Medium (Outer Space) -->
            <div class="row">
                <label>Medium (Outer)</label>
                <input type="color" id="color-medium" value="#050509">
            </div>
            <div class="row">
                <label>Offset</label>
                <input type="range" id="offset-medium" min="50" max="100" value="100">
                <span id="off-med-val" class="value-display">100%</span>
            </div>

            <!-- Atmosphere -->
            <div class="row" style="margin-top: 0.5rem;">
                <label>Atmosphere (Mid)</label>
                <input type="color" id="color-atmos" value="#00ffff">
            </div>
            <div class="row">
                <label>Thickness</label>
                <input type="range" id="offset-atmos" min="5" max="50" value="20">
                <span id="off-atm-val" class="value-display">20%</span>
            </div>

            <!-- Surface -->
            <div class="row" style="margin-top: 0.5rem;">
                <label>Surface (Inner)</label>
                <input type="color" id="color-surface" value="#330000">
            </div>
        </div>

        <div class="code-container">
            <button id="copy-btn" class="secondary">Copy Code</button>
            <pre id="code-out"></pre>
        </div>
    </aside>

    <script>
        // DOM Elements
        const gradient = document.getElementById('systemGradient');
        const s_surf = document.getElementById('stop-surface');
        const s_atm_i = document.getElementById('stop-atmos-inner');
        const s_atm_o = document.getElementById('stop-atmos-outer');
        const s_med = document.getElementById('stop-medium');
        const codeOut = document.getElementById('code-out');

        // State variables
        let isPlayingT = false;
        let isAnimatingA = false;
        let currentTime = 0;
        let baseA = 30;
        let currentA = 30;
        let loopId;
        
        // Auto-Random Variables
        let autoRandomInterval = null;
        let autoRandomTime = 0; // 0 means off
        let isAutoRandomActive = false;

        // --- Core Update Function ---
        const updateSystem = () => {
            const colorSurf = document.getElementById('color-surface').value;
            const colorAtmos = document.getElementById('color-atmos').value;
            const colorMed = document.getElementById('color-medium').value;

            const offAtmosAt = parseInt(document.getElementById('offset-atmos').value);
            const offMediumAt = parseInt(document.getElementById('offset-medium').value);

            s_surf.setAttribute('stop-color', colorSurf);
            s_atm_i.setAttribute('stop-color', colorAtmos); 
            s_atm_o.setAttribute('stop-color', colorAtmos); 
            s_med.setAttribute('stop-color', colorMed);

            const atmosStart = 5; 
            const atmosEnd = atmosStart + offAtmosAt;
            s_atm_i.setAttribute('offset', `${atmosStart}%`);
            s_atm_o.setAttribute('offset', `${atmosEnd}%`);
            s_med.setAttribute('offset', `${offMediumAt}%`);

            document.getElementById('off-atm-val').innerText = `${offAtmosAt}%`;
            document.getElementById('off-med-val').innerText = `${offMediumAt}%`;

            const timeFactor = parseInt(document.getElementById('t-slider').value);
            const semiAxis = parseInt(document.getElementById('a-slider').value);
            
            const angularVelocity = 1 / Math.pow(semiAxis, 1.5);
            const theta = timeFactor * angularVelocity * 10; 

            const fx = 50 + (semiAxis * Math.cos(theta));
            const fy = 50 + (semiAxis * Math.sin(theta));

            gradient.setAttribute('fx', `${fx.toFixed(2)}%`);
            gradient.setAttribute('fy', `${fy.toFixed(2)}%`);

            document.getElementById('t-val').innerText = timeFactor;
            document.getElementById('a-val').innerText = semiAxis;

            updateCodeReadout(fx, fy, colorSurf, colorAtmos, atmosStart, atmosEnd, colorMed, offMediumAt);
        };

        const updateCodeReadout = (fx, fy, cS, cA, aS, aE, cM, oM) => {
            codeOut.textContent = `<radialGradient id="exoplanet" fx="${fx.toFixed(1)}%" fy="${fy.toFixed(1)}%">
  <stop offset="0%" stop-color="${cS}" /> <!-- Surface -->
  <stop offset="${aS}%" stop-color="${cA}" /> <!-- Atmos Start -->
  <stop offset="${aE}%" stop-color="${cA}" stop-opacity="0" /> <!-- Atmos End -->
  <stop offset="${oM}%" stop-color="${cM}" /> <!-- Medium -->
</radialGradient>`;
        };

        // --- Animation Loop ---
        const animationLoop = () => {
            let changed = false;
            if (isPlayingT) {
                const tSlider = document.getElementById('t-slider');
                currentTime = (parseInt(tSlider.value) + 1) % 1000;
                tSlider.value = currentTime;
                changed = true;
            }
            if (isAnimatingA) {
                const aSlider = document.getElementById('a-slider');
                const pulse = Math.sin(Date.now() / 1000) * 10; 
                aSlider.value = Math.max(5, Math.min(50, baseA + pulse));
                changed = true;
            }

            if (changed) updateSystem();
            loopId = requestAnimationFrame(animationLoop);
        };

        // --- Randomization Logic ---
        const getRandomHex = () => `#${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')}`;
        
        const randomizeAll = () => {
            document.getElementById('color-surface').value = getRandomHex();
            document.getElementById('color-atmos').value = getRandomHex();
            document.getElementById('color-medium').value = getRandomHex();
            
            baseA = Math.floor(Math.random() * 40) + 10; 
            document.getElementById('a-slider').value = baseA;

            document.getElementById('offset-atmos').value = Math.floor(Math.random() * 30) + 10; 
            document.getElementById('offset-medium').value = Math.floor(Math.random() * 30) + 70; 

            updateSystem();
        };

        // --- Auto Play Toggle Logic ---
        const applyAutoRandomTime = () => {
            if (autoRandomInterval) clearInterval(autoRandomInterval);
            if (isAutoRandomActive && autoRandomTime > 0) {
                randomizeAll(); // Trigger immediately on start
                autoRandomInterval = setInterval(randomizeAll, autoRandomTime * 1000);
            }
        };

        // --- Event Listeners ---
        const inputs = ['t-slider', 'a-slider', 'color-surface', 'color-atmos', 'color-medium', 'offset-atmos', 'offset-medium'];
        inputs.forEach(id => document.getElementById(id).addEventListener('input', updateSystem));

        document.getElementById('play-t').addEventListener('click', (e) => {
            isPlayingT = !isPlayingT;
            e.target.innerText = isPlayingT ? '⏸' : '▶';
            e.target.classList.toggle('active');
        });

        document.getElementById('animate-a').addEventListener('click', (e) => {
            isAnimatingA = !isAnimatingA;
            baseA = parseInt(document.getElementById('a-slider').value); 
            e.target.classList.toggle('on');
        });

        document.getElementById('randomize-all').addEventListener('click', randomizeAll);

        // Timer Selection Listeners
        document.querySelectorAll('.timer-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                autoRandomTime = parseInt(e.target.dataset.time);
                if(isAutoRandomActive) applyAutoRandomTime();
            });
        });

        document.getElementById('timer-custom').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            if (val > 0) {
                document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
                autoRandomTime = val;
                if(isAutoRandomActive) applyAutoRandomTime();
            }
        });

        // Master Auto-Play Toggle
        document.getElementById('auto-play-toggle').addEventListener('click', (e) => {
            if (autoRandomTime === 0) {
                alert("Please select a time interval first (e.g., 5s, 20s, or Custom).");
                return;
            }
            
            isAutoRandomActive = !isAutoRandomActive;
            
            if (isAutoRandomActive) {
                e.target.innerText = '⏸ Stop Auto-Random';
                e.target.classList.add('active');
                e.target.classList.remove('secondary');
            } else {
                e.target.innerText = '▶ Start Auto-Random';
                e.target.classList.remove('active');
                e.target.classList.add('secondary');
            }
            
            applyAutoRandomTime();
        });

        // Copy Button
        document.getElementById('copy-btn').addEventListener('click', (e) => {
            navigator.clipboard.writeText(codeOut.textContent).then(() => {
                e.target.innerText = 'Copied!';
                setTimeout(() => e.target.innerText = 'Copy Code', 2000);
            });
        });

        // Fullscreen
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            const container = document.getElementById('svg-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => alert(`Error: ${err.message}`));
            } else {
                document.exitFullscreen();
            }
        });

        // Initialization
        updateSystem();
        animationLoop(); 

    </script>
</body>
</html>
